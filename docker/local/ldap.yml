services:
  unifiedui-ldap:
    image: osixia/openldap:1.5.0
    container_name: unifiedui-ldap
    restart: unless-stopped
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: svc-platform
      LDAP_READONLY_USER_PASSWORD: ${LDAP_SVC_PASSWORD}
      LDAP_SEED_INTERNAL_LDIF_PATH: /ldif-custom
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap/seed.ldif:/ldif-custom/seed.ldif:ro
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  unifiedui-ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    container_name: unifiedui-ldap-admin
    restart: unless-stopped
    ports:
      - "6443:443"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: unifiedui-ldap
      PHPLDAPADMIN_HTTPS: "true"
    depends_on:
      unifiedui-ldap:
        condition: service_healthy
    networks:
      - unifiedui_network

volumes:
  ldap_data:
  ldap_config:
