services:
  unifiedui-agent:
    build:
      context: ../../../unified-ui-agent-service
      dockerfile: ../unifiedui/docker/local/dockerfiles/agent.Dockerfile
    container_name: unifiedui-agent
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ../../../unified-ui-agent-service:/app
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8085"
      GIN_MODE: debug
      CACHE_TYPE: redis
      REDIS_HOST: unifiedui-cache
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      DOCDB_TYPE: mongodb
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@unifiedui-docdatabase:27017/?authSource=admin
      MONGODB_DATABASE: unifiedui
      VAULT_TYPE: HASHICORP_VAULT
      APP_VAULT_TYPE: dotenv
      APP_HASHICORP_VAULT_ADDR: http://unifiedui-vault:8200
      APP_HASHICORP_VAULT_TOKEN: ${VAULT_TOKEN}
      SECRETS_HASHICORP_VAULT_ADDR: http://unifiedui-vault:8200
      SECRETS_HASHICORP_VAULT_TOKEN: ${VAULT_TOKEN}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      PLATFORM_TO_AGENT_SERVICE_KEY: ${PLATFORM_TO_AGENT_SERVICE_KEY}
      AGENT_TO_PLATFORM_SERVICE_KEY: ${AGENT_TO_PLATFORM_SERVICE_KEY}
      AGENT_TO_REACT_SERVICE_KEY: ${AGENT_TO_REACT_SERVICE_KEY}
      PLATFORM_SERVICE_URL: http://unifiedui-platform:8000
      REACT_SERVICE_URL: http://unifiedui-react-agent:8086
      LOG_LEVEL: debug
      LOG_FORMAT: text
    networks:
      - unifiedui_network
    depends_on:
      unifiedui-docdatabase:
        condition: service_healthy
      unifiedui-cache:
        condition: service_healthy
      unifiedui-vault:
        condition: service_healthy

networks:
  unifiedui_network:
    name: unifiedui_network
    driver: bridge
