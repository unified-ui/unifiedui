services:
  unifiedui-sample-frontend:
    build:
      context: ../../../unifiedui-sample-frontend-ms
      dockerfile: ../unifiedui/docker/local/dockerfiles/sample-frontend.Dockerfile
    container_name: unifiedui-sample-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ../../../unifiedui-sample-frontend-ms/src:/app/src
      - ../../../unifiedui-sample-frontend-ms/index.html:/app/index.html:ro
      - ../../../unifiedui-sample-frontend-ms/vite.config.ts:/app/vite.config.ts:ro
      - ../../../unifiedui-sample-frontend-ms/tsconfig.json:/app/tsconfig.json:ro
      - ../../../unifiedui-sample-frontend-ms/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ../../../unifiedui-sample-frontend-ms/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ../../../unifiedui-sample-frontend-ms/eslint.config.js:/app/eslint.config.js:ro
      - ./config/vite.docker.config.ts:/app/vite.docker.config.ts:ro
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    networks:
      - unifiedui_network

networks:
  unifiedui_network:
    name: unifiedui_network
    driver: bridge
